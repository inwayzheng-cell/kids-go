<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小英雄圍棋 9x9</title>
    <style>
        :root {
            --bg-color: #1e272e;
            --board-color: #e6b44c;
            --line-color: #2c3e50;
        }
        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            color: #ecf0f1;
            user-select: none;
        }
        #status {
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 50px;
            min-height: 28px;
        }
        .controls {
            display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center;
        }
        button {
            padding: 8px 16px; border: none; border-radius: 20px;
            background: #e67e22; color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 3px 0 #d35400; transition: all 0.1s;
        }
        button:active { transform: translateY(3px); box-shadow: none; }
        button.sec { background: #7f8c8d; box-shadow: 0 3px #606c74; }
        button.act { background: #2ecc71; box-shadow: 0 3px #27ae60; }
        
        .board-wrap {
            position: relative; width: 94vw; height: 94vw; max-width: 500px; max-height: 500px;
            background-color: var(--board-color); border: 6px solid #8e44ad; border-radius: 12px;
            padding: 4%; box-sizing: border-box; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .board-inner { position: relative; width: 100%; height: 100%; }
        .grid-line { position: absolute; background-color: var(--line-color); opacity: 0.5; }
        
        /* 點擊熱區 */
        .intersection { 
            position: absolute; width: 12%; height: 12%; transform: translate(-50%, -50%); 
            z-index: 150; cursor: pointer; 
        }

        .stone {
            position: absolute; width: 9.5%; height: 9.5%; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 50;
            display: flex; justify-content: center; align-items: center;
            font-size: 4.5vw; pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @media (min-width: 500px) { .stone { font-size: 22px; } }
        .stone.b { background: #111; color: #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.6); }
        .stone.w { background: #f0f0f0; color: #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.4); }
        
        /* 氣數顯示 */
        .aura {
            position: absolute; width: 12%; height: 12%; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 30; pointer-events: none;
        }
        .aura.b { background: rgba(155, 89, 182, 0.5); box-shadow: 0 0 8px rgba(155, 89, 182, 0.5); }
        .aura.w { background: rgba(46, 204, 113, 0.5); box-shadow: 0 0 8px rgba(46, 204, 113, 0.5); }
        .danger { animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box {
            background: #2c3e50; padding: 20px; border-radius: 15px;
            width: 85%; max-width: 350px; text-align: center; color: white;
        }
    </style>
</head>
<body>
    <div id="status">😊 輪到黑棋 (你)</div>
    <div class="controls">
        <button id="btnAI" onclick="toggleAI()">🤖 AI: 關</button>
        <button onclick="passMove()">🏳️ 虛手</button>
        <button onclick="showScore()">📊 計分</button>
        <button class="sec" onclick="undoMove()">↩️ 悔棋</button>
        <button class="sec" onclick="resetGame()">🔄 重開</button>
    </div>

    <div class="board-wrap" id="wrap">
        <div class="board-inner" id="board"></div>
    </div>

    <!-- 計分 Modal -->
    <div class="modal" id="scoreModal" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal-box">
            <h3>🏆 對局結果</h3>
            <p>⚫ 黑棋: <span id="sB">0</span></p>
            <p>⚪ 白棋: <span id="sW">0</span> (含 6.5 目)</p>
            <h2 id="winnerText" style="color: #e67e22;"></h2>
            <button onclick="document.getElementById('scoreModal').style.display='none'">關閉</button>
        </div>
    </div>

    <script>
        const SZ = 9;
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const wrapEl = document.getElementById('wrap');
        
        let grid = Array(SZ).fill().map(() => Array(SZ).fill(null));
        let turn = 'black'; // black=human, white=AI
        let history = [];
        let ko = null; // 劫爭點 {r, c}
        let aiOn = false;
        let isAiThinking = false; // 🔒 防止 AI 思考期間點擊

        function init() {
            boardEl.innerHTML = '';
            for(let i=0; i<SZ; i++) {
                const p = (i/(SZ-1))*100;
                mkLine(0, p, 100, 2); mkLine(p, 0, 2, 100);
            }
            for(let r=0; r<SZ; r++) for(let c=0; c<SZ; c++) {
                const d = document.createElement('div');
                d.className = 'intersection';
                d.style.left = (c/(SZ-1)*100)+'%';
                d.style.top = (r/(SZ-1)*100)+'%';
                d.onclick = () => click(r, c);
                boardEl.appendChild(d);
            }
            draw();
        }

        function mkLine(x,y,w,h) {
            const l = document.createElement('div'); l.className='grid-line';
            l.style.left=x+'%'; l.style.top=y+'%'; l.style.width=w+'%'; l.style.height=h+'%';
            boardEl.appendChild(l);
        }

        // ================= 圍棋核心邏輯 =================

        function getGroup(r, c, col, st) {
            const g=[], v=new Set(), q=[[r,c]];
            v.add(`${r},${c}`);
            while(q.length) {
                const [cr,cc]=q.shift(); g.push([cr,cc]);
                for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                    const nr=cr+dr, nc=cc+dc, k=`${nr},${nc}`;
                    if(nr>=0 && nr<SZ && nc>=0 && nc<SZ && !v.has(k) && st[nr][nc]===col) {
                        v.add(k); q.push([nr,nc]);
                    }
                }
            }
            return g;
        }

        function getLibs(g, st) {
            const s=new Set();
            for(const [r,c] of g) {
                for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                    const nr=r+dr, nc=c+dc;
                    if(nr>=0 && nr<SZ && nc>=0 && nc<SZ && st[nr][nc]===null) s.add(`${nr},${nc}`);
                }
            }
            return s.size;
        }

        function isIllegal(r, c, col) {
            if(grid[r][c]!==null) return true;
            if(ko && ko.r===r && ko.c===c) return true; // 劫爭檢查
            
            // 模擬落子
            const sim = grid.map(r=>[...r]);
            sim[r][c] = col;
            const ene = col==='black'?'white':'black';
            let cap=[];
            
            // 檢查提子
            for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                const nr=r+dr, nc=c+dc;
                if(nr>=0 && nr<SZ && nc>=0 && nc<SZ && sim[nr][nc]===ene) {
                    const grp=getGroup(nr,nc,ene,sim);
                    if(getLibs(grp,sim)===0) cap.push(...grp);
                }
            }
            
            // 模擬提子移除
            cap.forEach(([cr,cc])=>sim[cr][cc]=null);
            
            // 檢查自殺
            const myG=getGroup(r,c,col,sim);
            return getLibs(myG,sim)===0; // 氣數為 0 且未提子 = 禁手
        }

        function applyCaptures(col) {
            const ene=col==='black'?'white':'black', v=new Set(), out=[];
            for(let r=0; r<SZ; r++) for(let c=0; c<SZ; c++) {
                if(grid[r][c]===ene && !v.has(`${r},${c}`)) {
                    const g=getGroup(r,c,ene,grid);
                    g.forEach(([gr,gc])=>v.add(`${gr},${gc}`));
                    if(getLibs(g,grid)===0) out.push(...g);
                }
            }
            out.forEach(([r,c])=>grid[r][c]=null);
            return out;
        }

        function updateKo(r, c, cap) {
            if(cap.length===1) ko={r:cap[0][0], c:cap[0][1]};
            else ko=null;
        }

        // ================= AI 邏輯 (防卡死版) =================

        function aiMove() {
            // 如果不是 AI 回合或已經在思考，直接返回
            if(!aiOn || turn!=='white' || isAiThinking) return;
            
            isAiThinking = true; // 🔒 鎖定
            statusEl.innerText = "🤖 AI 正在思考...";

            // 使用 setTimeout 讓出執行緒，確保 UI 更新「思考中」
            setTimeout(() => {
                try {
                    let bestMove = null;
                    let maxScore = -Infinity;

                    // 掃描全盤尋找最佳步
                    for(let r=0; r<SZ; r++) {
                        for(let c=0; c<SZ; c++) {
                            if(!isIllegal(r, c, 'white')) {
                                // 評分邏輯：提子 > 避死 > 佔地
                                let score = Math.random() * 5; 
                                const dist = Math.abs(r-4)+Math.abs(c-4);
                                score += (8-dist); // 偏好中央
                                
                                // 檢查能不能提子
                                const sim=grid.map(row=>[...row]); sim[r][c]='white';
                                // ... (簡化評分)
                                score += 100; 

                                if(score > maxScore) { maxScore = score; bestMove = {r, c}; }
                            }
                        }
                    }

                    if(bestMove) {
                        place(bestMove.r, bestMove.c, true);
                    } else {
                        // 無合法步 -> 虛手
                        passMove(); 
                    }
                } catch(e) {
                    console.error("AI 錯誤:", e);
                    statusEl.innerText = "😵 AI 當機了，請重置";
                } finally {
                    isAiThinking = false; // 🔓 無論成敗都解鎖
                }
            }, 50); 
        }

        // ================= 交互邏輯 =================

        function click(r,c) {
            if(isAiThinking || (aiOn && turn!=='black')) return;
            place(r,c,false);
        }

        function place(r,c, isAI) {
            if(isIllegal(r,c,turn)) return;
            
            if(!isAI) history.push({g:grid.map(r=>[...r]), t:turn, k:ko});

            grid[r][c]=turn;
            const cap=applyCaptures(turn);
            updateKo(r,c,cap);

            // 切換回合
            turn = turn==='black'?'white':'black';
            draw();
            updStatus();

            // 觸發 AI (如果不是 AI 下的子 且 輪到 AI)
            if(!isAI && aiOn && turn==='white') {
                aiMove();
            }
        }

        function passMove() {
            if(isAiThinking) return;
            history.push({g:grid.map(r=>[...r]), t:turn, k:ko});
            statusEl.innerText = `${turn==='black'?'⚫':'⚪'} 虛手`;
            turn = turn==='black'?'white':'black';
            draw(); updStatus();
            if(aiOn && turn==='white') aiMove();
        }

        function undoMove() {
            if(history.length===0 || isAiThinking) return;
            // 如果開 AI，一次悔兩步 (回到你的回合)
            if(aiOn && history.length>=2) { history.pop(); } // 撤回 AI
            const prev=history.pop(); // 撤回玩家
            grid=prev.g; turn=prev.t; ko=prev.k;
            draw(); updStatus();
        }

        function resetGame() {
            grid=Array(SZ).fill().map(()=>Array(SZ).fill(null));
            turn='black'; history=[]; ko=null; isAiThinking=false;
            draw(); updStatus();
        }

        function toggleAI() {
            aiOn=!aiOn;
            document.getElementById('btnAI').innerText = aiOn ? '🤖 AI: 開' : '🤖 AI: 關';
            document.getElementById('btnAI').className = aiOn ? 'act' : '';
            updStatus();
            if(aiOn && turn==='white') aiMove();
        }

        function updStatus() {
            if(!aiOn) statusEl.innerText=turn==='black'?'😊 輪到黑棋':'😎 輪到白棋';
            else statusEl.innerText=turn==='black'?'😊 輪到你 (黑)':'🤖 輪到 AI (白)';
        }

        // ================= 計分系統 =================
        function calcScore() {
            let bS=0, wS=0;
            const vis=new Set();
            for(let r=0; r<SZ; r++) for(let c=0; c<SZ; c++) {
                if(grid[r][c]==='black') bS++;
                else if(grid[r][c]==='white') wS++;
                else if(!vis.has(`${r},${c}`)) {
                    const area=[], q=[[r,c]]; vis.add(`${r},${c}`);
                    let tb=false, tw=false;
                    while(q.length) {
                        const [cr,cc]=q.shift(); area.push([cr,cc]);
                        for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
                            const nr=cr+dr, nc=cc+dc;
                            if(nr>=0&&nr<SZ&&nc>=0&&nc<SZ) {
                                if(grid[nr][nc]==='black') tb=true;
                                else if(grid[nr][nc]==='white') tw=true;
                                else if(!vis.has(`${nr},${nc}`)) { vis.add(`${nr},${nc}`); q.push([nr,nc]); }
                            }
                        }
                    }
                    if(tb && !tw) bS+=area.length;
                    else if(tw && !tb) wS+=area.length;
                }
            }
            return {b: bS, w: wS+6.5};
        }

        function showScore() {
            const s=calcScore();
            document.getElementById('sB').innerText=s.b;
            document.getElementById('sW').innerText=s.w.toFixed(1);
            document.getElementById('winnerText').innerText = s.b > s.w ? '⚫ 黑棋勝！' : '⚪ 白棋勝！';
            document.getElementById('scoreModal').style.display='flex';
        }

        // ================= 繪圖 =================
        function draw() {
            // 移除舊棋子
            document.querySelectorAll('.stone, .aura').forEach(e=>e.remove());
            for(let r=0; r<SZ; r++) for(let c=0; c<SZ; c++) {
                if(grid[r][c]) {
                    const d=document.createElement('div');
                    d.className=`stone ${grid[r][c]==='black'?'b':'w'}`;
                    d.style.left=(c/(SZ-1)*100)+'%'; d.style.top=(r/(SZ-1)*100)+'%';
                    d.innerHTML = grid[r][c]==='black'?'👹':'👻';
                    boardEl.appendChild(d);
                }
            }
            // 顯示 1 氣警告
            for(let r=0; r<SZ; r++) for(let c=0; c<SZ; c++) {
                if(grid[r][c]) {
                    const g=getGroup(r,c,grid[r][c],grid);
                    if(getLibs(g,grid)===1) {
                        const a=document.createElement('div');
                        a.className=`aura ${grid[r][c]==='black'?'b':'w'} danger`;
                        a.style.left=(c/(SZ-1)*100)+'%'; a.style.top=(r/(SZ-1)*100)+'%';
                        boardEl.appendChild(a);
                    }
                }
            }
        }

        window.onclick=e=>{ if(e.target.id==='scoreModal') e.target.style.display='none'; };
        init();
    </script>
</body>
</html>
